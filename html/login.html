<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EduLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style_login.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <main class="login-page">
        <div class="page-branding">
            <img src="../assets/tfnd.sd.png" alt="Talim.com Logo">
        </div>
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p>Access your professional development dashboard.</p>
            
            <form id="login-form" action="#" method="POST">
                <div class="input-group">
                    <label>Email Address</label>
                    <input id="loginEmail" type="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="relative-field">
                        <input id="loginPassword" type="password" placeholder="••••••••" required>
                        <button type="button" id="toggleLoginPassword" aria-label="Show password" class="password-toggle-btn">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>New here? <a href="register.html">Create an account</a></p>
            </div>
            <script src="../js/login.js"></script>
        </div>
    </main>

</body>
</html>
