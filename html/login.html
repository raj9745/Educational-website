<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EduLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style_login.css">
</head>
<body>

    <nav class="login-nav">
        <div class="container">
            <div class="logo">
                
                    <img src="../assets/tfnd.sd.png" alt="Talim Digital Nepal Logo" style="height: 500px; width: 500px; object-fit: contain;">

            </div>
        </div>
    </nav>

    <main class="login-page">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p>Access your professional development dashboard.</p>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>New here? <a href="#">Create an account</a></p>
            </div>
        </div>
    </main>

</body>
</html>
