<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EduLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style_register.css">
</head>
<body>

    <nav class="login-nav">
        <div class="container">
            <div class="logo">
                <a href="dashboard.html"><img src="../assets/tfnd.sd.png" alt="Talim Digital Nepal Logo " style="height:200px; width: 300px;"></a>
            </div>
        </div>
    </nav>

    <main class="login-page">
        <div class="auth-card">
            <h1>Create your account</h1>
            <p>Start your professional learning journey today.</p>
            
            <form id="register-form" action="#" method="POST">
                <div class="input-group">
                    <label>Full Name</label>
                    <input id="fullName" type="text" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input id="email" type="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div style="position:relative">
                        <input id="password" type="password" placeholder="••••••••" required>
                        <button type="button" id="togglePassword" aria-label="Show password" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer">Show</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div style="position:relative">
                        <input id="confirmPassword" type="password" placeholder="••••••••" required>
                        <button type="button" id="toggleConfirmPassword" aria-label="Show confirm password" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <!-- EmailJS SDK (supported version) -->
            <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
            <script>
                emailjs.init('wQoWyu-Yh8vowy0su');
            </script>
            <script src="../js/register.js"></script>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </main>

</body>
</html>
