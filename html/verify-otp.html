<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | EduLearn</title>
    <link rel="stylesheet" href="../css/otp.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        emailjs.init('wQoWyu-Yh8vowy0su');
    </script>
</head>
<body>
    <main class="otp-page">
        <div class="auth-card">
            <h1>Verify your email</h1>
            <p>We've sent a 6-digit code to your email. Enter it below to complete registration.</p>

            <form id="otp-form">
                <div class="input-group">
                    <label>Enter OTP</label>
                    <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required>
                </div>
                <button type="submit" class="btn-primary">Verify OTP</button>
            </form>

            <div style="margin-top:16px;">
                <button id="resendBtn" class="btn-secondary">Resend OTP</button>
            </div>

            <div class="auth-footer">
                <p>Need to change email? <a href="register.html">Go back</a></p>
            </div>
        </div>
    </main>

    <script src="../js/verify-otp.js"></script>
</body>
</html>
