<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | EduLearn</title>
    <link rel="stylesheet" href="../css/otp.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        emailjs.init('wQoWyu-Yh8vowy0su');
    </script>
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="dashboard.html" class="logo_image" role="img" aria-label="Talim Logo"></a>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html">Home</a>
                <a href="course.html">Courses</a>
                <a href="blogs.html">Blogs</a>
                <a href="about.html">About</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
                <a href="signed_up_user.html">Account</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="btn-login">Login</a>
                <a href="register.html" class="btn-primary">Get Started</a>
            </div>
        </div>
    </header>
    <main class="otp-page">
        <div class="auth-card">
            <h1>Verify your email</h1>
            <p>We've sent a 6-digit code to your email. Enter it below to complete registration.</p>

            <form id="otp-form">
                <div class="input-group">
                    <label>Enter OTP</label>
                    <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required>
                </div>
                <button type="submit" class="btn-primary">Verify OTP</button>
            </form>

            <div class="otp-actions">
                <button id="resendBtn" class="btn-secondary">Resend OTP</button>
            </div>

            <div class="auth-footer">
                <p>Need to change email? <a href="register.html">Go back</a></p>
            </div>
        </div>
    </main>

    <script src="../js/verify-otp.js"></script>
</body>
</html>
